<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">

    <title>CRYSTAL RUNNER</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <link rel="stylesheet" href="css/style.css">

    <link rel="shortcut icon" href="img/logo2SemFundo.png" type="image/x-icon">

</head>

<body>
    <div id="conteudo-sensivel">
        <header id="mainHeader">
            <div class="tema">
                <i id="icontema" class="fa-solid fa-toggle-off"></i>
            </div>
            <nav>
                <a href="#home" title="HOME" class="logo">
                    <img src="img/logo.png" alt="logo">
                </a>
                <ul>
                    <li>
                        <a href="index.html">Home</a>
                    </li>
                    <li>
                        <a href="sobre.html">Sobre</a>
                    </li>
                    <li>
                        <a href="contato.html">Contato</a>
                    </li>
                    <li>
                        <a href="jogar.html">Jogar</a>
                    </li>
                </ul>
            </nav>
        </header>

        <div class="banner">
            <a href="jogar.html" title="jogar">
                <img src="img/banner.png" alt="Crystal Runner Banner">
            </a>
        </div>

        <main>

            <script>
                const iconetema = document.getElementById("icontema");
                const header = document.getElementById("mainHeader");

                iconetema.addEventListener("click", () => {

                    document.body.classList.toggle("dark-tema");
                    header.classList.toggle("dark-header");
                    iconetema.classList.toggle("fa-toggle-off");
                    iconetema.classList.toggle("fa-toggle-on");
                });
            </script>

            <section id="jogar">
                <h2 class="h2-main">JOGO DEMO</h2>
                <br>
                <p class="texto">
                    JOGUE AGORA PARA TER UM <strong>"SABOR"</strong> DO QUE VOCÊ ESPERA!
                </p>
                <br>
                <div>
                    <a href="jogar.html" class="btn-jogar">JOGAR AGORA</a>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Crystal Runner. Todos os direitos reservados.</p>
            <p>Desenvolvido por Cristiani Budnik</p>
        </footer>

    </div>

    <script>

        const ANO_LANCAMENTO = 2026;
        let anoAtual = new Date().getFullYear();

        if (anoAtual == ANO_LANCAMENTO) {
            alert("📢 NOTÍCIA: Este jogo é um GRANDE LANÇAMENTO deste ano!");
        }


        let nomeVisitante = prompt("Bem-vindo ao Crystal Runner! Qual é o seu nome?");
        let idadeVisitante = prompt("Olá, " + nomeVisitante + "! Qual é a sua idade para acessar o conteúdo sensível?");

        if (idadeVisitante >= 18) {

            alert("Parabéns, " + nomeVisitante + "! Seu acesso foi liberado com sucesso.");

            document.getElementById("conteudo-sensivel").style.filter = "none";
        } else {

            alert("Lamentamos, " + nomeVisitante + ". Por segurança, as imagens do jogo permanecerão borradas.");

            document.getElementById("conteudo-sensivel").style.filter = "blur(20px)";
        }
    </script>
</body>

</html>
