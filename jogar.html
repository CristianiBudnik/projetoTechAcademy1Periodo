<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">

    <title>CRYSTAL RUNNER</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/styleComoJogar.css">

    <link rel="shortcut icon" href="img/logo2SemFundo.png" type="image/x-icon">

</head>

<body>
    <header id="mainHeader">
        <div class="tema">
            <i id="icontema" class="fa-solid fa-toggle-off"></i>
        </div>
        <nav>
            <a href="#home" title="HOME" class="logo">
                <img src="img/logo.png" alt="logo">
            </a>
            <ul>
                <li>
                    <a href="index.html">Home</a>
                </li>
                <li>
                    <a href="sobre.html">Sobre</a>
                </li>
                <li>
                    <a href="contato.html">Contato</a>
                </li>
                <li>
                    <a href="jogar.html">Jogar</a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <script>
            const iconetema = document.getElementById("icontema");
            const header = document.getElementById("mainHeader");

            iconetema.addEventListener("click", () => {

                document.body.classList.toggle("dark-tema");
                header.classList.toggle("dark-header");
                iconetema.classList.toggle("fa-toggle-off");
                iconetema.classList.toggle("fa-toggle-on");
            });
        </script>
        <div>
            <section>
                <p>versão <strong>MOBILE</strong></p>
                <h2>EM BREVE</h2>
                <p>E novas fases com muita diversão!</p>
                <iframe src="jogo/index.html" width="50%" height="370px" allow="autoplay"
                    class="molduraDoJogo"></iframe>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Crystal Runner. Todos os direitos reservados.</p>
        <p>Desenvolvido por Cristiani Budnik</p>
    </footer>
</body>

</html>
